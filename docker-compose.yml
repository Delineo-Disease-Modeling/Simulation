services:
  dmp:
    build:
      context: .
      dockerfile: Dockerfile.dmp
    image: ghcr.io/your-org/delineo-dmp:latest
    environment:
      - PORT=8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; urllib.request.urlopen(\"http://localhost:8000/docs\"); sys.exit(0)' "]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  simulator:
    build:
      context: .
      dockerfile: Dockerfile.sim
    image: ghcr.io/your-org/delineo-simulator:latest
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=1880
      - DMP_BASE_URL=http://dmp:8000
    depends_on:
      dmp:
        condition: service_healthy
    ports:
      - "1880:1880"
    restart: unless-stopped

# For local dev with live code, you can mount the source (uncomment):
#    volumes:
#      - ./:/app
