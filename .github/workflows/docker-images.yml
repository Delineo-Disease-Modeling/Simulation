name: Build and Push Docker Images

on:
  push:
    branches: [ main ]
    paths:
      - 'Simulation/**'
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: your-org
  DMP_IMAGE_NAME: delineo-dmp
  SIM_IMAGE_NAME: delineo-simulator

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (DMP)
        id: meta_dmp
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.DMP_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,format=long

      - name: Build and push DMP image
        uses: docker/build-push-action@v6
        with:
          context: Simulation
          file: Simulation/Dockerfile.dmp
          push: true
          tags: ${{ steps.meta_dmp.outputs.tags }}
          labels: ${{ steps.meta_dmp.outputs.labels }}

      - name: Extract metadata (Simulator)
        id: meta_sim
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.SIM_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,format=long

      - name: Build and push Simulator image
        uses: docker/build-push-action@v6
        with:
          context: Simulation
          file: Simulation/Dockerfile.sim
          push: true
          tags: ${{ steps.meta_sim.outputs.tags }}
          labels: ${{ steps.meta_sim.outputs.labels }}

  deploy-via-ssh:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/heads/main')
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (optional)
        uses: appleboy/ssh-action@v0.1.10
        if: ${{ secrets.DEPLOY_HOST && secrets.DEPLOY_USER && secrets.DEPLOY_KEY }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -euo pipefail
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            DMP_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.DMP_IMAGE_NAME }}:latest
            SIM_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.SIM_IMAGE_NAME }}:latest
            docker pull "$DMP_IMAGE"
            docker pull "$SIM_IMAGE"
            # Update compose file on server (assumes it exists at $DEPLOY_PATH)
            cd "$DEPLOY_PATH"
            # Export images as env so compose uses the latest
            export DMP_IMAGE="$DMP_IMAGE"
            export SIM_IMAGE="$SIM_IMAGE"
            docker compose down
            docker compose up -d --remove-orphans
